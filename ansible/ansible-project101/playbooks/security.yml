- name: Security hardening
  hosts: all
  become: yes

  tasks:
    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'

    - name: Restart SSH service
      service:
        name: sshd
        state: restarted      

    - name: Disable password authentication (optional but recommended)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'

    - name: Restart SSH service
      service:
        name: sshd
        state: restarted

    - name: Enable firewall
      service:
        name: firewalld
        state: started
        enabled: yes

    - name: Disable SELinux (temporary)
      selinux:
        state: disabled
     
    - name: Reboot server to apply SELinux changes
      reboot:
        reboot_timeout: 300      
