#---------------------------------------------------------------------
# Global settings
#---------------------------------------------------------------------
global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    #stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    maxconn 2048
    tune.ssl.default-dh-param 2048

#---------------------------------------------------------------------
# Defaults
#---------------------------------------------------------------------
defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  http-server-close
    option  forwardfor except 127.0.0.1
    option  redispatch
    retries 3
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    maxconn 2000
    # Removed errorfile lines (they caused file not found errors)

#---------------------------------------------------------------------
# Frontend - incoming traffic
#---------------------------------------------------------------------
frontend http_front
    bind *:80
    mode http
    default_backend app_back

    # Example ACL if you ever use a static backend
    # acl is_static path_beg /static
    # use_backend static_back if is_static

#---------------------------------------------------------------------
# Backend - application servers
#---------------------------------------------------------------------
backend app_back
    mode http
    balance roundrobin
    # Updated deprecated httpchk line
    http-check send meth HEAD uri / ver HTTP/1.1 hdr Host localhost
    server webserver101 192.168.1.147:80 check
    server webserver102 192.168.1.148:80 check
    server webserver103 192.168.1.149:80 check
    

#---------------------------------------------------------------------
# (Optional) Static backend for static content
#---------------------------------------------------------------------
# backend static_back
#     mode http
#     balance roundrobin
#     server static1 192.168.1.103:80 check

#---------------------------------------------------------------------
# (Optional) HAProxy Statistics Page
#---------------------------------------------------------------------
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth root:StrongPass123!
